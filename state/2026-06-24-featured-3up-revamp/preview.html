<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>精选推荐 v6 预览 — 大脉</title>
  <style>
    :root {
      --bg: #0A0A0B;
      --bg-gray: #141415;
      --bg-elevated: #1E1E20;
      --text: #f5f5f7;
      --text-secondary: rgba(235, 235, 245, 0.62);
      --border-light: rgba(255, 255, 255, 0.05);
      --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Display",
        "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { padding: 0; margin: 0; }
    html {
      font-family: var(--font-sans);
      font-size: 17px;
      line-height: 1.47;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    body { min-height: 100vh; padding: 0; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: 0; background: none; padding: 0; color: inherit; }
    .container-narrow { max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; }
    .section { padding: 2.5rem 0; background: var(--bg); }

    .featured-grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }
    .featured-card {
      position: relative;
      display: flex; flex-direction: column; justify-content: space-between;
      aspect-ratio: 16 / 9;
      border-radius: 16px;
      overflow: hidden;
      padding: 1.5rem;
      color: #fff;
      text-decoration: none;
      isolation: isolate;
      transition: transform 0.28s ease, box-shadow 0.28s ease;
    }
    .featured-card::after {
      content: ""; position: absolute; inset: 0; z-index: 0; pointer-events: none;
      background: linear-gradient(180deg, rgba(0,0,0,0) 40%, rgba(0,0,0,0.45) 100%);
      transition: background 0.28s ease;
    }
    .featured-card > * { position: relative; z-index: 1; }
    .featured-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
    }
    .featured-card:hover::after {
      background: linear-gradient(180deg, rgba(0,0,0,0) 20%, rgba(0,0,0,0.6) 100%);
    }
    .featured-card-tag {
      align-self: flex-start;
      font-size: 0.875rem; font-weight: 600; letter-spacing: 0.02em;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.45);
    }
    .featured-card-title {
      margin: 0;
      font-size: clamp(1.25rem, 2vw, 1.75rem);
      font-weight: 600; letter-spacing: -0.01em; line-height: 1.25;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
      max-width: 85%;
    }

    .case-card-thumb {
      aspect-ratio: 9/16;
      border-radius: 12px;
      overflow: hidden;
      background: linear-gradient(135deg, #2a2a2e, #1a1a1e);
      position: relative;
    }
    .watermark {
      position: absolute; left: 8px; top: 8px;
      background: rgba(255, 255, 255, 0.20);
      color: rgba(255, 255, 255, 0.72);
      font-size: 0.75rem; font-weight: 500; letter-spacing: 0.02em;
      padding: 3px 9px; border-radius: 999px;
    }
    .duration-badge {
      position: absolute; right: 8px; top: 8px;
      padding: 0.15rem 0.4rem;
      background: rgba(0,0,0,0.65);
      color: #fff; border-radius: 4px;
      font-size: 0.6875rem; font-variant-numeric: tabular-nums; font-weight: 500;
    }
    .tiles-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
    .mini-meta { display: flex; align-items: center; gap: 0.35rem; margin-bottom: 0.25rem; }
    .mini-avatar {
      width: 18px; height: 18px; border-radius: 50%;
      color: #fff; font-size: 0.5625rem; font-weight: 600;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .mini-name { font-size: 0.75rem; color: var(--text-secondary); font-weight: 500; }
    .mini-title { font-size: 0.8125rem; font-weight: 500; color: var(--text); line-height: 1.4; }

    .section-header {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-top: 2rem; margin-bottom: 1.25rem;
    }
    .section-header h2 {
      color: #ffffff; font-size: 1.25rem; font-weight: 500;
      margin: 0; letter-spacing: 0.01em;
    }
    .section-header a {
      color: rgba(255,255,255,0.55);
      font-size: 0.8125rem; font-weight: 500;
      transition: color 0.2s;
    }
    .section-header a:hover { color: #ffffff; }

    @media (max-width: 1024px) {
      .featured-grid-3 { grid-template-columns: 1fr; }
      .tiles-grid-4 { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

        <div>

          <div style="padding: 0.55rem 0.125rem 0;">

    </div>
  </section>
</body>
</html>
