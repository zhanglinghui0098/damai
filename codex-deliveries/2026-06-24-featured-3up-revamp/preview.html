<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>v8 三联屏 3D 预览</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #000; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; color: #fff; }

  /* v8: 三联屏 3D 视觉 (精选推荐重构)
     - 纯黑背景, 无标题栏
     - 整体场景 rotateX(6deg) 俯视 + 6s 上下漂浮
     - 三块 16:9 卡, 中间前凸 translateZ(60px) scale(1.04)
     - 左右屏 rotateY(±28deg) 向中心收拢, translateZ(-50px) scale(0.86)
     - hover: 该屏向前推 30px, 左右屏旋转角减到 22deg, 0.7s ease
     - 底部蒙版: 透明 → 65% 黑 (侧卡) / 透明 → 20% 黑 (中间卡)
     - 文字: 青蓝色小标签 + 白色加粗标题 (中间屏标题为黑色)
  */

  .featured-3d-scene {
    position: relative;
    background: #000;
    padding: 80px 0 100px;
    overflow: hidden;
    min-height: 600px;
  }

  .featured-3d-stage {
    position: relative;
    width: 100%;
    height: 480px;
    margin: 0 auto;
    perspective: 1600px;
    perspective-origin: 50% 50%;
    transform-style: preserve-3d;
    animation: featured3d-float 6s ease-in-out infinite;
  }

  @keyframes featured3d-float {
    0%, 100% { transform: rotateX(6deg) translateY(0); }
    50%      { transform: rotateX(6deg) translateY(-10px); }
  }

  .featured-3d-card {
    position: absolute;
    top: 50%;
    width: 36%;
    max-width: 520px;
    aspect-ratio: 16 / 9;
    border-radius: 16px;
    overflow: hidden;
    color: #fff;
    text-decoration: none;
    isolation: isolate;
    transform-style: preserve-3d;
    transition: transform 0.7s ease;
    will-change: transform;
    display: block;
  }

  .featured-3d-center {
    left: 32%;
    margin-top: -160px;
    z-index: 3;
    transform: translateZ(60px) scale(1.04);
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
  }

  .featured-3d-left {
    left: 6%;
    margin-top: -160px;
    z-index: 1;
    transform: translateX(-12%) rotateY(28deg) translateZ(-50px) scale(0.86);
  }

  .featured-3d-right {
    left: 58%;
    margin-top: -160px;
    z-index: 1;
    transform: translateX(12%) rotateY(-28deg) translateZ(-50px) scale(0.86);
  }

  .featured-3d-left::after,
  .featured-3d-right::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 40%, rgba(0,0,0,0.65) 100%);
    z-index: 1;
    pointer-events: none;
  }

  .featured-3d-center::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 60%, rgba(0,0,0,0.20) 100%);
    z-index: 1;
    pointer-events: none;
  }

  .featured-3d-text {
    position: absolute;
    bottom: 1.5rem;
    left: 1.5rem;
    right: 1.5rem;
    z-index: 2;
  }

  .featured-3d-tag {
    display: block;
    font-size: 0.875rem;
    font-weight: 600;
    color: #5dd5fc;
    letter-spacing: 0.02em;
    margin-bottom: 0.4rem;
    text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
  }

  .featured-3d-center .featured-3d-tag {
    text-shadow: 0 1px 3px rgba(255, 255, 255, 0.5);
  }

  .featured-3d-title {
    font-size: clamp(1.25rem, 2vw, 1.75rem);
    font-weight: 700;
    margin: 0;
    letter-spacing: -0.01em;
    line-height: 1.2;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
    max-width: 90%;
  }

  .featured-3d-center .featured-3d-title {
    color: #000;
    text-shadow: none;
  }

  /* Hover 联动 */
  .featured-3d-stage:has(.featured-3d-left:hover) .featured-3d-left {
    transform: translateX(-12%) rotateY(22deg) translateZ(-20px) scale(0.86);
  }
  .featured-3d-stage:has(.featured-3d-left:hover) .featured-3d-right {
    transform: translateX(12%) rotateY(-22deg) translateZ(-50px) scale(0.86);
  }
  .featured-3d-stage:has(.featured-3d-right:hover) .featured-3d-right {
    transform: translateX(12%) rotateY(-22deg) translateZ(-20px) scale(0.86);
  }
  .featured-3d-stage:has(.featured-3d-right:hover) .featured-3d-left {
    transform: translateX(-12%) rotateY(22deg) translateZ(-50px) scale(0.86);
  }
  .featured-3d-stage:has(.featured-3d-center:hover) .featured-3d-center {
    transform: translateZ(90px) scale(1.04);
  }
  .featured-3d-stage:has(.featured-3d-center:hover) .featured-3d-left {
    transform: translateX(-12%) rotateY(22deg) translateZ(-50px) scale(0.86);
  }
  .featured-3d-stage:has(.featured-3d-center:hover) .featured-3d-right {
    transform: translateX(12%) rotateY(-22deg) translateZ(-50px) scale(0.86);
  }

  @media (max-width: 1024px) {
    .featured-3d-stage { height: 240px; }
    .featured-3d-card { width: 50%; max-width: 320px; }
    .featured-3d-left, .featured-3d-center, .featured-3d-right { margin-top: -72px; }
    .featured-3d-left   { left: 0%;  transform: translateX(0) rotateY(15deg) translateZ(-30px) scale(0.82); }
    .featured-3d-center { left: 25%; transform: translateZ(20px) scale(1); }
    .featured-3d-right  { left: 50%; transform: translateX(0) rotateY(-15deg) translateZ(-30px) scale(0.82); }
    .featured-3d-scene  { padding: 40px 0 60px; }
  }
</style>
</head>
<body>
  <section class="featured-3d-scene">
    <div class="featured-3d-stage">
      <a href="/canvas/new" class="featured-3d-card featured-3d-left" style="background: linear-gradient(135deg, #1f2937 0%, #0a0a0a 100%);">
        <div class="featured-3d-text">
          <span class="featured-3d-tag">无限画布</span>
          <h3 class="featured-3d-title">四大维度·激励计划</h3>
        </div>
      </a>
      <a href="/templates" class="featured-3d-card featured-3d-center" style="background: linear-gradient(135deg, #f5f5f7 0%, #e5e7eb 100%);">
        <div class="featured-3d-text">
          <span class="featured-3d-tag">276 全新会员限时上线</span>
          <h3 class="featured-3d-title">Seedance2.0 720P 低至 0.3 元/秒</h3>
        </div>
      </a>
      <a href="/dashboard" class="featured-3d-card featured-3d-right" style="background: linear-gradient(135deg, #1e3a5f 0%, #0f1e3a 100%);">
        <div class="featured-3d-text">
          <span class="featured-3d-tag">点击</span>
          <h3 class="featured-3d-title">快速掌握新手指南</h3>
        </div>
      </a>
    </div>
  </section>
</body>
</html>
